server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/png;
    gzip_min_length 1024;

    # SPA 라우팅 — 알 수 없는 경로는 index.html 로 넘김
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시된 정적 자산 — 1년 캐시
    location ~* \.(js|css|png|ico|otf|woff|woff2|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
